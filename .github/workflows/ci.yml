name: CI

on:
  push:
  pull_request:

jobs:
  test:
    uses: waoooolab/openwaoooo/.github/workflows/service-python-ci-reusable.yml@main
    with:
      own_package: runtime_gateway
      install_command: |
        python -m pip install --upgrade pip
        python -m pip install -e .
        python -m pip install httpx
      test_command: |
        python -m unittest discover -s tests -p "test_*.py"
