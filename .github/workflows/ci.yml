name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout openwaoooo contracts source
        id: contracts-src
        env:
          CROSS_REPO_READ_TOKEN: ${{ secrets.CROSS_REPO_READ_TOKEN }}
        run: |
          if [ -n "${CROSS_REPO_READ_TOKEN}" ]; then
            git clone --depth 1 https://x-access-token:${CROSS_REPO_READ_TOKEN}@github.com/waoooolab/openwaoooo.git ../openwaoooo
          else
            git clone --depth 1 https://github.com/waoooolab/openwaoooo.git ../openwaoooo || true
          fi
          if [ -d ../openwaoooo/packages/contracts-py/src ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest
          python -m pip install httpx

      - name: Configure contracts-py import path
        run: |
          if [ -d ../openwaoooo/packages/contracts-py/src ]; then
            echo "PYTHONPATH=$PWD/../openwaoooo/packages/contracts-py/src${PYTHONPATH:+:$PYTHONPATH}" >> "$GITHUB_ENV"
            exit 0
          fi

          mkdir -p .ci/contracts-py/openwaoooo_contracts

          cat > .ci/contracts-py/openwaoooo_contracts/__init__.py <<'PY'
          from .entry_mode import EntryMode, ENTRY_MODE_SET, ENTRY_MODE_VALUES
          from .run_status import (
              RUN_NON_TERMINAL_STATUS_SET,
              RUN_NON_TERMINAL_STATUS_VALUES,
              RUN_STATUS_SET,
              RUN_STATUS_VALUES,
              RUN_TERMINAL_STATUS_SET,
              RUN_TERMINAL_STATUS_VALUES,
              RunStatus,
          )
          from .error_budget import (
              ERROR_BUDGET_ACTION_BY_LEVEL,
              SATURATION_TO_ERROR_BUDGET_LEVEL,
              ErrorBudgetAction,
              ErrorBudgetLevel,
          )
          PY

          cat > .ci/contracts-py/openwaoooo_contracts/entry_mode.py <<'PY'
          from typing import Literal

          EntryMode = Literal["assistant", "workflow", "tools", "mixed"]
          ENTRY_MODE_VALUES = ("assistant", "workflow", "tools", "mixed")
          ENTRY_MODE_SET = frozenset(ENTRY_MODE_VALUES)
          PY

          cat > .ci/contracts-py/openwaoooo_contracts/run_status.py <<'PY'
          from typing import Literal

          RunStatus = Literal[
              "requested",
              "queued",
              "dispatching",
              "running",
              "waiting_approval",
              "retrying",
              "succeeded",
              "failed",
              "dlq",
              "canceled",
              "timed_out",
          ]
          RUN_STATUS_VALUES = (
              "requested",
              "queued",
              "dispatching",
              "running",
              "waiting_approval",
              "retrying",
              "succeeded",
              "failed",
              "dlq",
              "canceled",
              "timed_out",
          )
          RUN_NON_TERMINAL_STATUS_VALUES = (
              "requested",
              "queued",
              "dispatching",
              "running",
              "waiting_approval",
              "retrying",
          )
          RUN_TERMINAL_STATUS_VALUES = ("succeeded", "failed", "dlq", "canceled", "timed_out")
          RUN_STATUS_SET = frozenset(RUN_STATUS_VALUES)
          RUN_NON_TERMINAL_STATUS_SET = frozenset(RUN_NON_TERMINAL_STATUS_VALUES)
          RUN_TERMINAL_STATUS_SET = frozenset(RUN_TERMINAL_STATUS_VALUES)
          PY

          cat > .ci/contracts-py/openwaoooo_contracts/error_budget.py <<'PY'
          from typing import Literal

          ErrorBudgetLevel = Literal["green", "yellow", "red"]
          ErrorBudgetAction = Literal[
              "allow_new_dispatch",
              "defer_new_dispatch",
              "pause_new_dispatch",
          ]
          ERROR_BUDGET_ACTION_BY_LEVEL = {
              "green": "allow_new_dispatch",
              "yellow": "defer_new_dispatch",
              "red": "pause_new_dispatch",
          }
          SATURATION_TO_ERROR_BUDGET_LEVEL = {
              "normal": "green",
              "warning": "yellow",
              "hard_stop": "red",
          }
          PY

          echo "PYTHONPATH=$PWD/.ci/contracts-py${PYTHONPATH:+:$PYTHONPATH}" >> "$GITHUB_ENV"

      - name: Boundary Import Guard
        run: |
          if [ -f scripts/check_boundary_imports.py ]; then
            python scripts/check_boundary_imports.py --own-package runtime_gateway
          else
            echo "skip boundary import guard: script not found"
          fi

      - name: Code Shape Guard
        run: |
          if [ -f scripts/check_code_shape.py ]; then
            python scripts/check_code_shape.py \
              --warn-file-lines 300 \
              --fail-file-lines 500 \
              --warn-function-lines 40 \
              --fail-function-lines 80
          else
            echo "skip code shape guard: script not found"
          fi

      - name: Run Tests
        run: |
          python -m unittest discover -s tests -p "test_*.py"

  e2e-cross-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout runtime-gateway
        uses: actions/checkout@v4

      - name: Check cross-repo token
        id: token
        env:
          CROSS_REPO_READ_TOKEN: ${{ secrets.CROSS_REPO_READ_TOKEN }}
        run: |
          if [ -z "$CROSS_REPO_READ_TOKEN" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Cross-repo E2E skipped: CROSS_REPO_READ_TOKEN is not set."
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout runtime-execution
        if: ${{ steps.token.outputs.available == 'true' }}
        run: |
          git clone https://x-access-token:${{ secrets.CROSS_REPO_READ_TOKEN }}@github.com/waoooolab/runtime-execution.git ../runtime-execution

      - name: Setup Python
        if: ${{ steps.token.outputs.available == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        if: ${{ steps.token.outputs.available == 'true' }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install -e ../runtime-execution
          python -m pip install httpx

      - name: Run Cross-Repo E2E Test
        if: ${{ steps.token.outputs.available == 'true' }}
        run: |
          python -m unittest tests.test_e2e_run_flow

  governance-guards:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install governance guard deps
        run: python -m pip install --upgrade pip pyyaml

      - name: Run Governance Guards
        shell: bash
        run: |
          set -euo pipefail
          guards=(
            "guard.docs.one-active-authority-per-domain"
            "guard.docs.lifecycle-transition"
            "guard.docs.execution-to-archive-expiry"
            "guard.docs.supersede-link"            "guard.registry.sync"
            "guard.contract.source-trace"
            "guard.docs.report-file-naming"            "guard.docs.report-required-fields"
            "guard.docs.authority-reference-only"
            "guard.docs.readme-boundary"
            "guard.docs.cross-layer-coupling"            "guard.docs.lifecycle-header-state-lint"
            "guard.contract.hybrid-mirror-sync-freshness"
            "guard.contract.authority-slot-binding"
          )
          for guard_id in "${guards[@]}"; do
            python scripts/governance/guards/check_governance_guard.py --guard-id "$guard_id"
          done
