name: CI

on:
  push:
  pull_request:

jobs:
  test:
    uses: waoooolab/openwaoooo/.github/workflows/service-python-ci-reusable.yml@0b3ff9b6ba8762600c275df0d35dee4bc81c7d0a
    with:
      own_package: runtime_gateway
      install_command: |
        python -m pip install --upgrade pip
        python -m pip install -e .
        python -m pip install httpx
      test_command: |
        python -m unittest discover -s tests -p "test_*.py"

  e2e-cross-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout runtime-gateway
        uses: actions/checkout@v4

      - name: Check cross-repo token
        id: token
        env:
          CROSS_REPO_READ_TOKEN: ${{ secrets.CROSS_REPO_READ_TOKEN }}
        run: |
          if [ -z "$CROSS_REPO_READ_TOKEN" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Cross-repo E2E skipped: CROSS_REPO_READ_TOKEN is not set."
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout runtime-execution
        if: ${{ steps.token.outputs.available == 'true' }}
        run: |
          git clone https://x-access-token:${{ secrets.CROSS_REPO_READ_TOKEN }}@github.com/waoooolab/runtime-execution.git ../runtime-execution

      - name: Setup Python
        if: ${{ steps.token.outputs.available == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        if: ${{ steps.token.outputs.available == 'true' }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install -e ../runtime-execution
          python -m pip install httpx

      - name: Run Cross-Repo E2E Test
        if: ${{ steps.token.outputs.available == 'true' }}
        run: |
          python -m unittest tests.test_e2e_run_flow

  governance-guards:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install governance guard deps
        run: pip install pyyaml
      - name: Run V3 governance guards (standard)
        run: |
          python scripts/governance/guards/check_governance_guard.py --guard-id guard.docs.one-active-authority-per-domain
          python scripts/governance/guards/check_governance_guard.py --guard-id guard.docs.lifecycle-transition
          python scripts/governance/guards/check_governance_guard.py --guard-id guard.docs.execution-to-archive-expiry
          python scripts/governance/guards/check_governance_guard.py --guard-id guard.docs.supersede-link
          python scripts/governance/guards/check_governance_guard.py --guard-id guard.docs.report-set-completeness
          python scripts/governance/guards/check_governance_guard.py --guard-id guard.registry.sync
          python scripts/governance/guards/check_governance_guard.py --guard-id guard.contract.source-trace
          python scripts/governance/guards/check_governance_guard.py --guard-id guard.docs.report-file-naming
          python scripts/governance/guards/check_governance_guard.py --guard-id guard.docs.log-entry-timestamp
          python scripts/governance/guards/check_governance_guard.py --guard-id guard.docs.report-required-fields
          python scripts/governance/guards/check_governance_guard.py --guard-id guard.docs.authority-reference-only
          python scripts/governance/guards/check_governance_guard.py --guard-id guard.docs.semantic-duplication
          python scripts/governance/guards/check_governance_guard.py --guard-id guard.docs.readme-boundary
          python scripts/governance/guards/check_governance_guard.py --guard-id guard.docs.cross-layer-coupling
          python scripts/governance/guards/check_governance_guard.py --guard-id guard.docs.authoring-scaffold
          python scripts/governance/guards/check_governance_guard.py --guard-id guard.docs.lifecycle-header-state-lint
          python scripts/governance/guards/check_governance_guard.py --guard-id guard.contract.hybrid-mirror-sync-freshness
          python scripts/governance/guards/check_governance_guard.py --guard-id guard.docs.generated-artifact-drift
          python scripts/governance/guards/check_governance_guard.py --guard-id guard.contract.authority-slot-binding
