name: PR Foundation Link Guard

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

jobs:
  validate-foundation-link:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Validate TODO or Phase reference in PR body
        uses: actions/github-script@v7
        with:
          script: |
            const body = (context.payload.pull_request.body || "").trim();
            const patterns = [
              /FOUNDATION-TODO(?:\.md)?/i,
              /FOUNDATION-IMPLEMENTATION-PHASES(?:\.md)?/i,
              /docs\/todo\/FOUNDATION-TODO\.md/i,
              /docs\/roadmap\/FOUNDATION-IMPLEMENTATION-PHASES\.md/i,
              /\bP\d+\.\d+\b/,
              /\bphase\s*exit\b/i,
            ];
            const hasReference = patterns.some((pattern) => pattern.test(body));
            if (!hasReference) {
              core.setFailed(
                "PR body must reference at least one foundation TODO item or phase exit criterion. Example: 'TODO: P6.8' or 'Phase Exit: ...'."
              );
            }
